name: Build docker image and push it to AWS ECR with OIDC

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: 
      - "docker/**"

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION }}

jobs:
  build: 
    name: Build the image and deploy it to AWS ECR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          role-to-assume: ${{ secrets.OIDC_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@62f4f872db3836360b72999f4b87f1ff13310f3a

      - name: Build Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          REPO_NAME: ${{ vars.REPO_NAME }}
        run: |
          docker buildx build \
          --platform linux/amd64 \
          -f Docker/Dockerfile \
          -t "${ECR_REGISTRY}/${REPO_NAME}:${GITHUB_SHA}" \
          .
        
      - name: Push Docker image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          REPO_NAME: ${{ vars.REPO_NAME }}
        run: |
          docker push "${ECR_REGISTRY}/${REPO_NAME}:${GITHUB_SHA}"
